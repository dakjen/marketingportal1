    <meta name="theme-color" content="#d8c49c" />
    <meta property="og:title" content="DJC Marketing — Lease-Up Marketing for Affordable & Workforce Housing" />
    <meta property="og:description" content="DJC Marketing (DakJen Creative LLC) specializes in lease-up marketing for affordable and workforce housing developments. Multi-channel campaigns, applicant support, and transparent reporting." />
    <meta property="og:image" content="https://dakjencreative.com/favicon-new.png" />
    <meta property="og:url" content="https://dakjencreative.com" />
    <meta property="og:type" content="website" />
    <meta name="description" content="DJC Marketing is a new, founder-led lease-up marketing company built specifically for affordable and workforce housing. Led by Dakotah Jennifer, a young entrepreneur with 5+ years inside the real estate development industry." />
    <meta name="keywords" content="lease-up marketing, affordable housing marketing, workforce housing, apartment marketing, Section 8, HCVP, residential lease-up, DakJen Creative, DJC Marketing, affordable marketing agency" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "DJC Marketing",
      "alternateName": "DakJen Creative LLC",
      "description": "DJC Marketing is a new, founder-led lease-up marketing company built specifically for affordable and workforce housing. Founded by Dakotah Jennifer, a young entrepreneur with over five years of hands-on experience inside the real estate development industry. Affordable pricing, senior-level attention, and deep development-sector expertise that established agencies don't have.",
      "url": "https://dakjencreative.com",
      "email": "marketing@dakjencreative.com",
      "founder": {
        "@type": "Person",
        "name": "Dakotah Jennifer",
        "jobTitle": "Founder & Project Lead"
      },
      "knowsAbout": [
        "Lease-up marketing",
        "Affordable housing",
        "Workforce housing",
        "Section 8 / HCVP housing",
        "Mixed-income residential development",
        "Digital advertising",
        "Community outreach",
        "Applicant pool analysis"
      ],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Lease-Up Marketing Services",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Tier 1 — Online & Social Campaign",
              "description": "Digital lead generation across paid and organic channels including Facebook, Instagram, Google Ads, LinkedIn, apartment listings, and biweekly reporting."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Tier 2 — Total Marketing Package",
              "description": "All Tier 1 services plus billboard, radio, newspaper, podcast placements, employer and nonprofit outreach, printed materials, and on-site signage."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Tier 3 — Full Boat",
              "description": "All Tier 2 services plus grassroots canvassing, model unit staging with professional photography, application support, and full applicant pool reporting."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Application Support",
              "description": "Per-applicant review, follow-up by phone, email, and text. Proven to recover over 20% of initially rejected applicants."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Applicant Pool Reporting",
              "description": "Deep-dive analytics, lead pipeline breakdowns, Section 8 tracking, and benchmark comparisons delivered to stakeholders."
            }
          }
        ]
      }
    }
    </script>
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-building.svg" />
